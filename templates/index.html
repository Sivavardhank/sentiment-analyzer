<!DOCTYPE html>
<html>
<head>
    <title>AI Sentiment Analyzer</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-size: 40px;
        }

        input {
            width: 300px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #00adb5;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #007b80;
        }

        .result {
            margin-top: 25px;
            font-size: 22px;
        }

        .history {
            margin-top: 30px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <h1>AI Sentiment Analyzer 🚀</h1>

    <form method="POST">
        <input type="text" name="text" placeholder="Enter your sentence..." required>
        <br>
        <button type="submit">Analyze</button>
    </form>

    {% if prediction %}
    <div class="result">
        <p>{{ prediction }}</p>
        <p>Confidence: {{ confidence }}%</p>
    </div>
    {% endif %}

    <div class="history">
        <p>Try: "not bad movie", "worst film ever", "it's okay"</p>
    </div>

</body>
</html>
