 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Sentiment Analyzer | Shiva</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    transition: 0.4s;
}

/* DARK MODE */
.dark {
    background: #121212;
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 420px;
    text-align: center;
    box-shadow: 0px 10px 40px rgba(0,0,0,0.3);
    transition: 0.4s;
}

.dark .card {
    background: #1e1e1e;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 110px;
    padding: 10px;
    border-radius: 10px;
    margin-top: 15px;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #667eea;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* RESULT COLORS */
.positive { color: #00c853; }
.negative { color: #ff1744; }
.neutral  { color: #ff9100; }

/* SPINNER */
.spinner {
    display: none;
    margin-top: 15px;
}

.loader {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #667eea;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* HISTORY */
.history {
    margin-top: 20px;
    text-align: left;
    max-height: 150px;
    overflow-y: auto;
    font-size: 14px;
}

/* EMOJI ANIMATION */
.bounce {
    animation: bounce 0.5s;
}

@keyframes bounce {
    0% { transform: scale(0.8); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* DARK BUTTON */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
}
</style>

<script>
// DARK MODE TOGGLE
function toggleDark() {
    document.body.classList.toggle("dark");
}

// SPINNER
function showLoader() {
    document.getElementById("spinner").style.display = "block";
}

// HISTORY (LOCAL STORAGE)
function saveHistory(text) {
    let history = JSON.parse(localStorage.getItem("history")) || [];
    history.unshift(text);
    localStorage.setItem("history", JSON.stringify(history));
}

// LOAD HISTORY
function loadHistory() {
    let history = JSON.parse(localStorage.getItem("history")) || [];
    let list = document.getElementById("history");

    list.innerHTML = "";
    history.slice(0,5).forEach(item => {
        list.innerHTML += "<div>• " + item + "</div>";
    });
}

window.onload = loadHistory;
</script>

</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="container">
<div class="card">

<h1>🎬 Sentiment Analyzer</h1>

<form method="POST" onsubmit="showLoader(); saveHistory(document.getElementById('msg').value)">
    <textarea id="msg" name="message" placeholder="Enter your review..."></textarea>
    <br>
    <button type="submit">Analyze</button>
</form>

<!-- LOADING -->
<div id="spinner" class="spinner">
    <div class="loader"></div>
</div>

<!-- RESULT -->
{% if prediction %}
<div class="result bounce
{% if "Positive" in prediction %}positive
{% elif "Negative" in prediction %}negative
{% else %}neutral
{% endif %}
">
    {{ prediction }} 🎉
</div>

<div>
    Confidence: {{ confidence }}%
</div>
{% endif %}

<!-- HISTORY -->
<div class="history">
    <strong>Recent Inputs:</strong>
    <div id="history"></div>
</div>

</div>
</div>

</body>
</html>
